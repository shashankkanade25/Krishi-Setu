<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h1>Test Login Form</h1>
    <form id="testForm">
        <input type="email" id="email" value="shashankkanade07@gmail.com" placeholder="Email"><br><br>
        <input type="password" id="password" value="1234567890" placeholder="Password"><br><br>
        <select id="role">
            <option value="farmer">Farmer</option>
            <option value="customer">Customer</option>
        </select><br><br>
        <button type="submit">Login</button>
    </form>

    <div id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0;"></div>

    <script>
        const form = document.getElementById('testForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            output.innerHTML = 'Sending request...<br>';
            console.log('Sending:', data);

            try {
                const response = await fetch('http://localhost:5000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data),
                    credentials: 'include'
                });

                const text = await response.text();
                output.innerHTML += `Status: ${response.status}<br>`;
                output.innerHTML += `Response: ${text}<br>`;
                console.log('Response:', text);

                const result = JSON.parse(text);
                if (result.success && result.redirect) {
                    output.innerHTML += `<strong>SUCCESS! Redirecting to: ${result.redirect}</strong><br>`;
                    console.log('Redirecting to:', result.redirect);
                    
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                }
            } catch (error) {
                output.innerHTML += `<strong style="color: red;">Error: ${error.message}</strong><br>`;
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
